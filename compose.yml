services:
  postgres:
    image: postgres:18
    container_name: postgres-dishes
    restart: always
    environment:
      POSTGRES_USER: dishes_user
      POSTGRES_PASSWORD: dishes_password
      POSTGRES_DB: dishes
    volumes:
      - ./postgresql:/var/lib/postgresql

  backend:
    image: prinshertog/kokenmetlisa-backend:52-add-pagination-for-the-application-for-a-smooth-experience
    # build:
    #  context: backend
    # container_name: kokenmetlisa-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dishes
      SPRING_DATASOURCE_USERNAME: dishes_user
      SPRING_DATASOURCE_PASSWORD: dishes_password
      CREATE_ADMIN_USER: "false"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - ./files:/app/Files
    ports:
      - 8080:8080

  frontend:
    image: prinshertog/kokenmetlisa-frontend:52-add-pagination-for-the-application-for-a-smooth-experience
    # build:
    #  context: frontend
    #  no_cache: true
    container_name: kokenmetlisa-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PUBLIC_BASE_URL_BACKEND: http://backend:8080
      ORIGIN: http://localhost:3000
      BODY_SIZE_LIMIT: 3G
    depends_on:
      backend:
        condition: service_healthy