{{ define "main" }}
  {{ $tags := slice "lunch" }} <!-- Replace with your specific tags -->
  {{ $taggedPosts := where .Site.RegularPages "Params.tags" "intersect" $tags }}

  {{ range $taggedPosts }}
    <a href="{{ .RelPermalink }}">
      <article class="posts">
        {{ if .Params.featured }}
          <div class="image" style="background-image: url('{{ .Params.featured | absURL }}'); background-position: center; background-size: cover; padding: 80pt 20pt;"></div>
        {{ end }}
        <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
      </article>
    </a>
  {{ end }}
{{ end }}
